<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pi Security Monitor — Sign In</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#f1f5f9;
  font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  font-size:14px;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;
  padding:36px 40px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.icon{width:44px;height:44px;background:linear-gradient(135deg,#4f46e5,#7c3aed);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;color:#fff;margin:0 auto 16px}
h1{text-align:center;font-size:18px;font-weight:700;margin-bottom:4px}
.sub{text-align:center;color:#64748b;font-size:13px;margin-bottom:28px}
label{display:block;font-size:12px;font-weight:600;color:#94a3b8;
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
input[type=password]{width:100%;background:#0f172a;border:1px solid #334155;
  color:#f1f5f9;padding:10px 14px;border-radius:8px;font-size:14px;
  font-family:inherit;outline:none;transition:border-color .15s;margin-bottom:16px}
input[type=password]:focus{border-color:#818cf8}
button{width:100%;background:#4f46e5;border:none;color:#fff;
  padding:11px 14px;border-radius:8px;cursor:pointer;font-size:14px;
  font-family:inherit;font-weight:600;transition:background .15s}
button:hover{background:#4338ca}
.err{background:#2d0e0e;border:1px solid #7f1d1d;color:#fca5a5;
  border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px}
</style>
</head>
<body>
<div class="card">
  <div class="icon">&#9632;</div>
  <h1>Pi Security Monitor</h1>
  <p class="sub">Enter your password to continue</p>
  {% if error %}
  <div class="err">{{ error }}</div>
  {% endif %}
  <form method="post">
    <label>Password</label>
    <input type="password" name="password" autofocus autocomplete="current-password">
    <button type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
